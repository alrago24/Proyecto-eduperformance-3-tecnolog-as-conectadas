spring.application.name=proyecto-entidades

spring.config.import=optional:file:.env[.properties]

# PostgreSQL Database Configuration
spring.datasource.url=jdbc:postgresql://pooled.db.prisma.io:5432/postgres?sslMode=require
spring.datasource.username=34a217518c4eb1c1efab859ba7ad9944106aa0c31485fad30ae5f73b3c0471a4
spring.datasource.password=sk_aaY_l8cHufaHobBoJDuDd
spring.datasource.driver-class-name=org.postgresql.Driver

# HikariCP Connection Pool settings optimized for Prisma Postgres Serverless
spring.datasource.hikari.maximum-pool-size=2
spring.datasource.hikari.minimum-idle=1
spring.datasource.hikari.idle-timeout=30000
spring.datasource.hikari.connection-timeout=20000

# JPA/Hibernate Configuration
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Evita que Spring mantenga conexiones muertas en el pool
spring.datasource.hikari.max-lifetime=600000
spring.datasource.hikari.keepalive-time=30000
spring.datasource.hikari.connection-timeout=20000


# Cambia el nivel global a solo Advertencias y Errores
logging.level.root=INFO

# ==========================================
# Configuración de OpenAPI / Swagger UI
# ==========================================
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.tags-sorter=alpha
springdoc.swagger-ui.operations-sorter=alpha

# Enable/disable the Scalar API reference (default: false)
scalar.enabled=true
# The URL of your OpenAPI document
scalar.url=http://localhost:8080/api-docs
